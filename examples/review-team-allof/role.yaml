name: Review Team Lead
description: Code review requiring all conditions met (all_of)
model: gpt-4
prompt: |
  You are a team lead coordinating a code review workflow.
  Follow the collaboration graph to dispatch work.
subagents:
  - name: Coder
    description: Implements code changes
    prompt: You are a senior developer. Write clean, testable code.
  - name: Reviewer
    description: Reviews code for quality
    prompt: |
      You review code for correctness, style, and edge cases.
      When satisfied, include "APPROVED" in your response.
collaboration:
  topology: review-loop
  agents: [coder, reviewer]
  max_iterations: 5
  termination:
    all_of:
      - { max_iterations: 2 }
      - result_matches:
          agent: reviewer
          contains: "APPROVED"
